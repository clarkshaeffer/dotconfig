set-option -g default-shell /bin/zsh

# don't auto-rename tabs, keep blank for `,` renaming
set-option -g allow-rename off

# change default modifier (vim-windows)
unbind C-b
set-option -g prefix C-s
bind-key C-s send-prefix

# s and v to horiz/vert window (vim-windows)
unbind s
bind s split-window -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

# flip c and x (vim-windows)
unbind c
unbind x
bind c kill-pane
bind x command-prompt -p "window name:" "new-window; rename-window '%%'"

# vim lag time to 0
set -s escape-time 0

# if other session, goto on exit
set-option -g detach-on-destroy off

unbind l
set -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# previous window
unbind space
bind space last-window

# reorder number order
unbind r
bind r move-window -r

# tpm
# remember: prefix-I to install, prefix-U to update
#
# dracula
set -g @plugin 'dracula/tmux'
set -g @dracula-plugins "cpu-usage ram-usage time"
set -g @dracula-show-left-icon ' '
set -g @dracula-show-location false
set -g @dracula-military-time true
set -g @dracula-show-timezone false
set -g @dracula-day-month true
set -g @dracula-time-format "%a %m/%d %R"
#
# init tpm (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
# if installed via homebrew, instead:
# run '/opt/homebrew/opt/tpm/share/tpm/tpm'
